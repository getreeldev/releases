name: 'Reel Security Scan'
description: 'Scan container images for vulnerabilities, generate SBOMs, and detect malware'

inputs:
  image:
    description: 'Container image to scan'
    required: true
  scan-types:
    description: 'Comma-separated scan types: sbom, cbom, sarif, malware'
    default: 'sbom'
  format:
    description: 'SBOM format: cyclonedx, spdx, spdx-json'
    default: 'cyclonedx'
  scanners:
    description: 'Trivy scanners: vuln,secret,license,config,all (comma-separated)'
    default: 'vuln'
  severity:
    description: 'Trivy severity filter: LOW,MEDIUM,HIGH,CRITICAL (comma-separated)'
    default: ''
  output-dir:
    description: 'Directory for scan outputs'
    default: 'reel-results'
  reel-version:
    description: 'Reel CLI version (tag name, e.g. v1.0.0)'
    default: 'latest'
  fail-on-findings:
    description: 'Fail if any findings survive the scan filters (true/false)'
    default: 'false'
  local:
    description: 'Restrict to local image only (container daemon); fail if not found. Without this, reel looks locally first and falls back to the registry.'
    default: 'false'
  ignore-unfixed:
    description: 'Ignore vulnerabilities without a fix available (sbom + sarif scans only). When true, unfixed HIGH/CRITICAL CVEs do not fail the gate.'
    default: 'false'

outputs:
  sbom-file:
    description: 'Path to SBOM output file'
    value: ${{ steps.scan.outputs.sbom-file }}
  sarif-file:
    description: 'Path to SARIF output file'
    value: ${{ steps.scan.outputs.sarif-file }}
  cbom-file:
    description: 'Path to CBOM output file'
    value: ${{ steps.scan.outputs.cbom-file }}
  malware-file:
    description: 'Path to malware scan output file'
    value: ${{ steps.scan.outputs.malware-file }}
  vuln-count:
    description: 'Number of vulnerabilities found after filtering'
    value: ${{ steps.gate.outputs.vuln-count }}
  malware-count:
    description: 'Number of infected files found'
    value: ${{ steps.gate.outputs.malware-count }}

runs:
  using: 'composite'
  steps:
    - name: Set up reel
      shell: bash
      run: |
        if [ "${{ inputs.reel-version }}" = "latest" ]; then
          URL="https://github.com/getreeldev/releases/releases/latest/download/reel_linux_amd64.tar.gz"
        else
          URL="https://github.com/getreeldev/releases/releases/download/${{ inputs.reel-version }}/reel_linux_amd64.tar.gz"
        fi
        curl -sL "$URL" | tar xz
        sudo mv reel /usr/local/bin/
        reel version

    - name: Create output directory
      shell: bash
      run: mkdir -p ${{ inputs.output-dir }}

    - name: Run scans
      id: scan
      shell: bash
      run: |
        SCANNER_FLAGS=""
        if [ -n "${{ inputs.scanners }}" ]; then
          SCANNER_FLAGS="--scanners ${{ inputs.scanners }}"
        fi
        SEVERITY_FLAGS=""
        if [ -n "${{ inputs.severity }}" ]; then
          SEVERITY_FLAGS="--severity ${{ inputs.severity }}"
        fi
        LOCAL_FLAG=""
        if [ "${{ inputs.local }}" = "true" ]; then
          LOCAL_FLAG="--local"
        fi
        IGNORE_UNFIXED_FLAG=""
        if [ "${{ inputs.ignore-unfixed }}" = "true" ]; then
          IGNORE_UNFIXED_FLAG="--ignore-unfixed"
        fi

        IFS=',' read -ra TYPES <<< "${{ inputs.scan-types }}"
        for type in "${TYPES[@]}"; do
          type=$(echo "$type" | xargs)
          case "$type" in
            sbom)
              reel export sbom --image "${{ inputs.image }}" \
                -f "${{ inputs.format }}" \
                $SCANNER_FLAGS $SEVERITY_FLAGS $LOCAL_FLAG $IGNORE_UNFIXED_FLAG \
                -o "${{ inputs.output-dir }}/sbom.json"
              echo "sbom-file=${{ inputs.output-dir }}/sbom.json" >> "$GITHUB_OUTPUT"
              ;;
            cbom)
              reel export cbom --image "${{ inputs.image }}" \
                $LOCAL_FLAG \
                -o "${{ inputs.output-dir }}/cbom.json"
              echo "cbom-file=${{ inputs.output-dir }}/cbom.json" >> "$GITHUB_OUTPUT"
              ;;
            sarif)
              reel export sarif --image "${{ inputs.image }}" \
                $SCANNER_FLAGS $SEVERITY_FLAGS $LOCAL_FLAG $IGNORE_UNFIXED_FLAG \
                -o "${{ inputs.output-dir }}/results.sarif"
              echo "sarif-file=${{ inputs.output-dir }}/results.sarif" >> "$GITHUB_OUTPUT"
              ;;
            malware)
              reel export malware --image "${{ inputs.image }}" \
                $LOCAL_FLAG \
                -o "${{ inputs.output-dir }}/malware.json"
              echo "malware-file=${{ inputs.output-dir }}/malware.json" >> "$GITHUB_OUTPUT"
              ;;
          esac
        done

    - name: Upload SARIF to Code Scanning
      if: hashFiles(format('{0}/results.sarif', inputs.output-dir)) != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output-dir }}/results.sarif
        category: reel

    - name: Summarize & gate
      id: gate
      shell: bash
      env:
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        set +e
        OUT_DIR="${INPUT_OUTPUT_DIR}"
        IMAGE="${INPUT_IMAGE}"
        FAIL_ON_FINDINGS="${INPUT_FAIL_ON_FINDINGS}"

        MAX_SEVERITY_DEF='
        def max_severity:
          ([.ratings[].severity // "unknown"]
            | map(if . == "critical" then 4
                  elif . == "high" then 3
                  elif . == "medium" then 2
                  elif . == "low" then 1
                  else 0 end)
            | max) as $rank
          | if $rank == 4 then "critical"
            elif $rank == 3 then "high"
            elif $rank == 2 then "medium"
            elif $rank == 1 then "low"
            else "unknown" end;
        '

        FAILED=0
        FAIL_REASONS=()
        ROWS_FILE=$(mktemp)
        DETAILS_FILE=$(mktemp)
        trap 'rm -f "$ROWS_FILE" "$DETAILS_FILE"' EXIT

        # ---- SBOM ----
        SBOM_FILE="${OUT_DIR}/sbom.json"
        if [ -f "$SBOM_FILE" ]; then
          TOTAL=$(jq '.vulnerabilities // [] | length' "$SBOM_FILE" 2>/dev/null || echo 0)
          echo "vuln-count=${TOTAL}" >> "$GITHUB_OUTPUT"
          if [ "$TOTAL" -gt 0 ]; then
            BUCKET_TEXT=$(jq -r "${MAX_SEVERITY_DEF}"'
              [.vulnerabilities[]? | max_severity] | group_by(.) | map({(.[0]): length}) | add // {}
              | [.critical // 0, .high // 0, .medium // 0, .low // 0, .unknown // 0] as [$c, $h, $m, $l, $u]
              | [ if $c > 0 then "\($c) CRITICAL" else empty end,
                  if $h > 0 then "\($h) HIGH"     else empty end,
                  if $m > 0 then "\($m) MEDIUM"   else empty end,
                  if $l > 0 then "\($l) LOW"      else empty end,
                  if $u > 0 then "\($u) UNKNOWN"  else empty end ]
              | join(", ")
            ' "$SBOM_FILE")
            FINDINGS="${TOTAL} vulns (${BUCKET_TEXT})"
            if [ "$FAIL_ON_FINDINGS" = "true" ]; then
              STATUS="[FAIL]"
              FAILED=1
              FAIL_REASONS+=("SBOM: ${FINDINGS}")
            else
              STATUS="[WARN]"
            fi
          else
            STATUS="[PASS]"
            FINDINGS="0 vulns"
          fi
          printf '| SBOM    | %-38s | %-6s |\n' "$FINDINGS" "$STATUS" >> "$ROWS_FILE"
          if [ "$TOTAL" -gt 0 ]; then
            {
              echo "<details><summary>Top SBOM vulnerabilities (max severity across rating sources)</summary>"
              echo ""
              jq -r "${MAX_SEVERITY_DEF}"'
                [.vulnerabilities[]? | {id: .id, severity: max_severity, affects: (.affects[0].ref // "?")}]
                | sort_by(.severity as $s | ["critical","high","medium","low","unknown"] | index($s) // 99)
                | .[0:20][]
                | "- **\(.severity | ascii_upcase)** `\(.id)` — \(.affects)"
              ' "$SBOM_FILE"
              echo ""
              echo "</details>"
              echo ""
            } >> "$DETAILS_FILE"
          fi
        fi

        # ---- SARIF ----
        SARIF_FILE="${OUT_DIR}/results.sarif"
        if [ -f "$SARIF_FILE" ]; then
          ERRORS=$(jq   '[.runs[0].results[]? | select(.level=="error")]   | length' "$SARIF_FILE" 2>/dev/null || echo 0)
          WARNINGS=$(jq '[.runs[0].results[]? | select(.level=="warning")] | length' "$SARIF_FILE" 2>/dev/null || echo 0)
          NOTES=$(jq    '[.runs[0].results[]? | select(.level=="note")]    | length' "$SARIF_FILE" 2>/dev/null || echo 0)
          FINDINGS="${ERRORS} errors, ${WARNINGS} warnings, ${NOTES} notes"
          printf '| SARIF   | %-38s | [INFO] |\n' "$FINDINGS" >> "$ROWS_FILE"
          if [ "$ERRORS" -gt 0 ]; then
            {
              echo "<details><summary>SARIF errors (informational)</summary>"
              echo ""
              jq -r '[.runs[0].results[]? | select(.level=="error")] | .[0:10][] | "- `\(.ruleId)`"' "$SARIF_FILE"
              echo ""
              echo "> SARIF and SBOM report the same Trivy vuln findings via different lenses. The gate trips on the SBOM count; SARIF here is for the Code Scanning lens."
              echo ""
              echo "</details>"
              echo ""
            } >> "$DETAILS_FILE"
          fi
        fi

        # ---- CBOM ----
        CBOM_FILE="${OUT_DIR}/cbom.json"
        if [ -f "$CBOM_FILE" ]; then
          CBOM_TOTAL=$(jq '.components // [] | length' "$CBOM_FILE" 2>/dev/null || echo 0)
          if [ "$CBOM_TOTAL" -eq 0 ]; then
            FINDINGS="0 assets detected *(system CAs excluded)*"
          else
            BY_TYPE=$(jq -r '
              [.components[].cryptoProperties.assetType] | group_by(.) | map({(.[0]): length}) | add // {}
              | [.certificate // 0, .protocol // 0, ."related-crypto-material" // 0, .algorithm // 0] as [$c, $p, $k, $a]
              | [ if $c > 0 then "\($c) cert\(if $c==1 then "" else "s" end)"         else empty end,
                  if $p > 0 then "\($p) protocol\(if $p==1 then "" else "s" end)"     else empty end,
                  if $k > 0 then "\($k) key\(if $k==1 then "" else "s" end)"          else empty end,
                  if $a > 0 then "\($a) algorithm\(if $a==1 then "" else "s" end)"    else empty end ]
              | join(", ")
            ' "$CBOM_FILE")
            FINDINGS="${CBOM_TOTAL} components (${BY_TYPE})"
          fi
          printf '| CBOM    | %-38s | [INFO] |\n' "$FINDINGS" >> "$ROWS_FILE"
          if [ "$CBOM_TOTAL" -gt 0 ]; then
            {
              echo "<details><summary>CBOM breakdown (informational)</summary>"
              echo ""
              jq -r '
                [.components[].cryptoProperties.assetType] | group_by(.) | map({(.[0]): length}) | add // {}
                | to_entries | sort_by(.key) | .[] | "- \(.key): \(.value)"
              ' "$CBOM_FILE"
              echo ""
              echo "</details>"
              echo ""
            } >> "$DETAILS_FILE"
          fi
        fi

        # ---- Malware ----
        MALWARE_FILE="${OUT_DIR}/malware.json"
        if [ -f "$MALWARE_FILE" ]; then
          INFECTED=$(jq '.summary.infected_count // 0' "$MALWARE_FILE" 2>/dev/null || echo 0)
          echo "malware-count=${INFECTED}" >> "$GITHUB_OUTPUT"
          if [ "$INFECTED" -gt 0 ]; then
            FINDINGS="${INFECTED} infected"
            if [ "$FAIL_ON_FINDINGS" = "true" ]; then
              STATUS="[FAIL]"
              FAILED=1
              FAIL_REASONS+=("Malware: ${INFECTED} infected file(s)")
            else
              STATUS="[WARN]"
            fi
          else
            STATUS="[PASS]"
            FINDINGS="0 infected"
          fi
          printf '| Malware | %-38s | %-6s |\n' "$FINDINGS" "$STATUS" >> "$ROWS_FILE"
          if [ "$INFECTED" -gt 0 ]; then
            {
              echo "<details><summary>Infected files</summary>"
              echo ""
              jq -r '(.infected_files // [])[] | "- `\(.path)` — \(.virus_name)"' "$MALWARE_FILE"
              echo ""
              echo "</details>"
              echo ""
            } >> "$DETAILS_FILE"
          fi
        fi

        # ---- Emit summary ----
        {
          echo "## Reel Security Scan — \`${IMAGE}\`"
          echo ""
          echo "| Scan    | Findings                               | Status |"
          echo "|---------|----------------------------------------|--------|"
          cat "$ROWS_FILE"
          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "**Result**: [FAIL] — ${#FAIL_REASONS[@]} scan(s) tripped the gate."
            echo ""
            for reason in "${FAIL_REASONS[@]}"; do
              echo "- $reason"
            done
            echo ""
          else
            echo "**Result**: [PASS]"
            echo ""
          fi
          cat "$DETAILS_FILE"
        } >> "$GITHUB_STEP_SUMMARY"

        if [ "$FAILED" -eq 1 ]; then
          for reason in "${FAIL_REASONS[@]}"; do
            echo "::error::${reason}"
          done
          exit 1
        fi
